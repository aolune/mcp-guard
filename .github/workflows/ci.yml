name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev || pip install -e ".[dev]"
      - run: uv run --extra dev ruff check .
      - run: uv run --extra dev pytest

  security-gate:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev || pip install -e ".[dev]"
      - run: uv run python -m mcp_guard scan examples/safe_mcp_config.json --format json --fail-on high --out mcp-guard-report.json
      - run: uv run python -m mcp_guard scan examples/poisoned_tool_manifest.json --format sarif --out mcp-guard-report.sarif
      - run: uv run python -m mcp_guard benchmark examples/fixture_matrix.yaml --format json --out mcp-guard-benchmark.json
      - run: uv run python -m mcp_guard benchmark examples/fixture_matrix.yaml --out mcp-guard-benchmark.md
      - uses: github/codeql-action/upload-sarif@v4
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: mcp-guard-report.sarif
          category: mcp-guard-demo
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcp-guard-reports
          path: |
            mcp-guard-report.json
            mcp-guard-report.sarif
            mcp-guard-benchmark.json
            mcp-guard-benchmark.md
